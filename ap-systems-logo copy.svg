<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="nodeglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="#06060f" rx="8"/>

  <!-- "AP" wordmark -->
  <text x="60" y="188"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="170"
        fill="#f0f0ff"
        letter-spacing="8">AP</text>

  <!-- Cyan accent dot glow -->
  <circle cx="328" cy="100" r="10" fill="#00e5ff" filter="url(#nodeglow)" opacity="0.9"/>
  <!-- Cyan accent dot solid -->
  <circle cx="328" cy="100" r="5" fill="#00e5ff"/>

  <!-- "SYSTEMS" -->
  <text x="62" y="240"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="48"
        fill="#00e5ff"
        letter-spacing="22">SYSTEMS</text>

  <!-- Accent underline -->
  <rect x="62" y="252" width="380" height="2" fill="url(#lineGrad)" rx="1"/>

</svg>
